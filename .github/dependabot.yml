# Dependabot will run on day 15 of each month at 02:24 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '57 1 11 * *'
    open-pull-requests-limit: 15

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '57 1 11 * *'
    open-pull-requests-limit: 20
    versioning-strategy: 'increase'
